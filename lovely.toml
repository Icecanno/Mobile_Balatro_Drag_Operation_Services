[manifest]
version = "1.0.1c"
dump_lua = true
priority = 0

[[patches]]
[patches.pattern]
target = "engine/controller.lua"
pattern = '''--The object being dragged'''
position = "after"
payload = '''
    if self.is_cursor_down then 
        self.cursor_down.distance = math.max(Vector_Dist(self.cursor_down.T, self.cursor_hover.T), self.cursor_down.distance or 0)
    else
        self.cursor_down.distance = nil
    end
    if not self.dragging.handled and self.cursor_down.distance and (self.cursor_down.distance > 0.2) and (G.SETTINGS.GRAPHICS.operation_mode or 1) >= 2 then
        create_drag_target_from_card(self.dragging.target)
        self.dragging.handled = true
    end
'''
match_indent = false
overwrite = false

[[patches]]
[patches.pattern]
target = "engine/controller.lua"
pattern = '''self.cursor_up.handled = true'''
position = "before"
payload = '''
        if self.cursor_down.target and self.dragging.prev_target then
            local releasable = nil
            for _, v in ipairs(self.collision_list) do
                if v.states.hover.can and (not v.states.drag.is) and (v ~= self.dragging.prev_target) then
                    releasable = v
                    break 
                end
            end
            if releasable and releasable.states.release_on.can then 
                self.released_on.target = releasable
                self.released_on.handled = false
            end
        end
'''
match_indent = false
overwrite = false

[[patches]]
[patches.pattern]
target = "engine/controller.lua"
pattern = '''self.released_on.target:release(self.dragging.prev_target)'''
position = "at"
payload = '''
        if self.released_on.target and self.released_on.target.release then self.released_on.target:release(self.dragging.prev_target) end
'''
match_indent = false
overwrite = false

[[patches]]
[patches.pattern]
target = "engine/ui.lua"
pattern = '''if self.parent then self.parent:release(other) end'''
position = "before"
payload = '''
    if self.config.release_func then 
        self.config.release_func(other)
    end
'''
match_indent = false
overwrite = false

[[patches]]
[patches.pattern]
target = "engine/ui.lua"
pattern = '''--Draw the outline for highlighted buttons'''
position = "before"
payload = '''
    if self.config.pulse_border then
        self.border_pulse_timer = self.border_pulse_timer or G.TIMERS.REAL
        local lw = 2*math.max(0, 0.5*math.cos(6*(G.TIMERS.REAL - self.border_pulse_timer)) + 0.5)
        prep_draw(self, 1)
        love.graphics.scale((1)/(G.TILESIZE))
        love.graphics.setLineWidth(lw + 1)
        love.graphics.setColor(adjust_alpha(G.C.BLACK, 0.2*lw, true))
        self:draw_pixellated_rect('fill', parallax_dist)
        love.graphics.setColor(self.config.colour[4] > 0 and mix_colours(G.C.WHITE, self.config.colour, 0.8) or G.C.WHITE)
        self:draw_pixellated_rect('line', parallax_dist)
        love.graphics.pop()
    end
'''
match_indent = false
overwrite = false

[[patches]]
[patches.pattern]
target = "engine/controller.lua"
pattern = '''self.cursor_down = {T = {x=0, y=0}, target = nil, time = 0, handled = true}'''
position = "before"
payload = '''
self.slide = {handled = true, can = false, target = nil}
'''
match_indent = false
overwrite = false

[[patches]]
[patches.pattern]
target = "engine/controller.lua"
pattern = '''self.cursor_down.handled = true'''
position = "before"
payload = '''
        if self.hover_locked then
            self.hover_locked.states.hover.is = false
            self.hover_locked:stop_hover()
            self.hover_locked = nil
        end
        if self.cursor_down.target == G.ROOM then self.slide.handled = false end
'''
match_indent = false
overwrite = false

[[patches]]
[patches.pattern]
target = "engine/controller.lua"
pattern = '''if not self.cursor_up.handled then'''
position = "before"
payload = '''
    if not self.slide.handled then
        if Vector_Dist(self.cursor_down.T, self.cursor_hover.T) >= 0.1*G.MIN_CLICK_DIST then
            self.slide.can = true
            self.slide.handled = true
        end
    end

    if self.slide.can then
        if self.hovering.target and self.hovering.target:is(Card) and self.hovering.target.area and G.hand and self.hovering.target.area == G.hand then
            if not self.slide.target then
                self.hovering.target:click()
                self.slide.target = self.hovering.target
            elseif self.hovering.target ~= self.slide.target then
                self.hovering.target:click()
                self.slide.target = self.hovering.target
            end
        end
    end

'''
match_indent = false
overwrite = false

[[patches]]
[patches.pattern]
target = "engine/controller.lua"
pattern = '''self.cursor_up.handled = true'''
position = "before"
payload = '''
        self.slide.handled = true; self.slide.can = false; self.slide.target = nil
'''
match_indent = false
overwrite = false

[[patches]]
[patches.pattern]
target = "engine/controller.lua"
pattern = '''self.dragging.target.states.drag.is = false'''
position = "after"
payload = '''
            if self.HID.touch and self.cursor_up.time - self.cursor_down.time > 0.3 and Vector_Dist(self.cursor_down.T, self.cursor_up.T) < G.MIN_CLICK_DIST then
                self.hover_locked = self.dragging.target
                self.hover_locked.states.hover.is = true
                self.hover_locked:set_offset(self.cursor_hover.T, 'Hover')
                local _ID =  self.hover_locked.ID
                G.E_MANAGER:add_event(Event({trigger = 'after', blockable = false, blocking = false, delay = G.MIN_HOVER_TIME, func = function()
                    if self.hover_locked and _ID == self.hover_locked.ID then
                        self.hover_locked:hover() 
                    end
                return true end}))
            end
'''
match_indent = false
overwrite = false
